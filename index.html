<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThreadThink - 批注式 AI 对话</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Auth overlay (dynamically rendered) -->

<div class="app">

  <header class="header">
    <div class="header-left">
      <button class="btn-icon" id="btnToggleSidebar" title="对话列表">☰</button>
      <h1 class="logo">ThreadThink</h1>
      <span class="tagline">批注式 AI 对话</span>
    </div>
    <div class="header-right">
      <span class="user-email" id="userEmail"></span>
      <button class="btn-icon" id="btnSettings" title="设置">⚙️</button>
      <button class="btn-icon" id="btnClear" title="清空">🗑️</button>
      <button class="btn-icon" id="btnLogout" title="退出">🚪</button>
    </div>
  </header>

  <div class="workspace" id="workspace">

    <!-- Conversation list sidebar -->
    <aside class="conv-sidebar" id="convSidebar">
      <div class="conv-sidebar-header">
        <span>对话</span>
        <button class="btn-new-conv" id="btnNewConv" title="新建对话">+</button>
      </div>
      <div class="conv-list" id="conversationList"></div>
    </aside>

    <aside class="sidebar" id="sidebarLeft">
      <div class="sidebar-hint" id="sidebarLeftHint">拖入卡片固定</div>
      <div class="sidebar-inner" id="sidebarLeftInner"></div>
    </aside>

    <main class="conversation" id="conversation">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">💬</div>
        <h2>开始一段非线性对话</h2>
        <p>在 AI 的回复中<strong>选中任意文字</strong>，以批注形式追问。</p>
      </div>
    </main>

    <aside class="sidebar" id="sidebarRight">
      <div class="sidebar-hint" id="sidebarRightHint">拖入卡片固定</div>
      <div class="sidebar-inner" id="sidebarRightInner"></div>
    </aside>

  </div>

  <div class="selection-toolbar" id="selectionToolbar">
    <button id="btnAnnotate">💬 对此追问</button>
  </div>

  <footer class="input-area">
    <div class="input-wrapper">
      <textarea id="userInput" placeholder="输入你的问题，Enter 发送..." rows="1"></textarea>
      <button class="btn-send" id="btnSend" title="发送">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M2 10L18 2L10 18L9 11L2 10Z" fill="currentColor"/>
          <path d="M9 11L18 2" stroke="white" stroke-width="1.5"/>
        </svg>
      </button>
    </div>
  </footer>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="settingsModal">
    <div class="modal-header">
      <h3>设置</h3>
      <button class="btn-close" id="btnCloseModal">✕</button>
    </div>
    <div class="modal-body">
      <label class="field">
        <span>API Key</span>
        <input type="password" id="apiKeyInput" placeholder="sk-...">
        <small>支持 Anthropic / OpenAI / DeepSeek 的 API Key</small>
      </label>
      <label class="field">
        <span>API 地址</span>
        <input type="text" id="apiBaseInput" placeholder="https://api.deepseek.com/v1/chat/completions">
        <small>DeepSeek / Anthropic / OpenAI 兼容地址</small>
      </label>
      <label class="field">
        <span>模型</span>
        <input type="text" id="modelInput" placeholder="deepseek-chat">
      </label>
      <label class="field">
        <span>系统提示词</span>
        <textarea id="systemPromptInput" rows="3" placeholder="你是一个有帮助的AI助手..."></textarea>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btnResetSettings">恢复默认</button>
      <button class="btn btn-primary" id="btnSaveSettings">保存</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
